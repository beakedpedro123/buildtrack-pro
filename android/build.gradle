// Top-level build file where you can add configuration options common to all sub-projects/modules.

ext {
    minSdkVersion = 24
}

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// [withMinSdk24] Force minSdkVersion
// Hermes (React Native 0.81) requires minSdkVersion 24+
ext {
    minSdkVersion = 24
    compileSdkVersion = 35
    targetSdkVersion = 35
    buildToolsVersion = "35.0.0"
    ndkVersion = "27.1.12297006"
}
// [/withMinSdk24]
apply plugin: "expo-root-project"

// [NUCLEAR] Override after expo-root-project
ext.minSdkVersion = 24
ext.compileSdkVersion = 35
ext.targetSdkVersion = 35

// Force on ALL subprojects via afterEvaluate
allprojects {
    afterEvaluate { proj ->
        proj.ext.set("minSdkVersion", 24)
        if (proj.hasProperty("android")) {
            proj.android {
                if (it.hasProperty("defaultConfig")) {
                    it.defaultConfig {
                        if (minSdkVersion.apiLevel < 24) {
                            minSdkVersion 24
                        }
                    }
                }
            }
        }
    }
}


apply plugin: "com.facebook.react.rootproject"
