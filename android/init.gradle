
// Force minSdkVersion 24 for all subprojects
// This runs before any build.gradle is evaluated
allprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                if (it.hasProperty('defaultConfig')) {
                    it.defaultConfig {
                        if (minSdkVersion.apiLevel < 24) {
                            minSdkVersion 24
                        }
                    }
                }
            }
        }
    }
}
